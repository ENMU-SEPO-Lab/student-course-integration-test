name: Java CI with Ant

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Java
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install Ant
      run: sudo apt-get install -y ant
    
    # - name: Run Checkstyle
    #   run: ant checkstyle

    - name: Run Tests
      run: ant ci
    
    - name: Debug report files
      run: |
        echo "Listing workspace:"
        ls -R

        echo "Reports folder:"
        ls -R reports || true

    - name: Send Feedback Email
      if: always()
      env:
        GMAIL_USER: alarusie@gmail.com
        GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      run: |
        python <<'EOF'
        import os
        import smtplib
        from email.message import EmailMessage
        from pathlib import Path

        gmail_user = os.environ["GMAIL_USER"]
        gmail_pass = os.environ["GMAIL_APP_PASSWORD"]

        reports_dir = Path("reports")

        # Collect ONLY text files
        files = list(reports_dir.glob("*.txt"))

        # Fallback recipient (simple)
        student_email = "essa.imhmed@enmu.edu"

        msg = EmailMessage()
        msg["Subject"] = "Automated Grading Feedback"
        msg["From"] = gmail_user
        msg["To"] = student_email
        msg.set_content("Hello,\n\nYour code assessment reports are attached.\n\nRegards.")

        # Attach ONLY .txt files
        for file in files:
            with open(file, "rb") as f:
                msg.add_attachment(
                    f.read(),
                    maintype="text",
                    subtype="plain",
                    filename=file.name
                )

        # Send email
        with smtplib.SMTP("smtp.gmail.com", 587) as server:
            server.starttls()
            server.login(gmail_user, gmail_pass)
            server.send_message(msg)

        print("Feedback email sent successfully!")
        EOF
